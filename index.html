<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>REP JOURNAL</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d0d; --surface:#161616; --surface2:#1e1e1e;
    --border:#2a2a2a; --pull:#b2d8b2; --dip:#f0f0f0;
    --text:#f0f0f0; --muted:#444; --muted2:#777;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;}
  body.timer-active { padding-bottom: 70px; }

  /* HEADER */
  header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:2.1rem;letter-spacing:5px;line-height:1;}
  .week-label{font-size:0.56rem;color:var(--muted2);letter-spacing:2px;}
  .build-label{font-size:0.5rem;color:var(--muted2);letter-spacing:2px;margin-top:3px;}
  #todayLabel{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:2px;}
  .version-badge{margin-top:3px;font-size:0.5rem;color:var(--muted2);letter-spacing:1px;}

  /* NAV */
  .nav-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:62px;z-index:99;}
  .nav-btn{flex:1;padding:10px 2px;background:none;border:none;color:var(--muted2);font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:2px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
  .nav-btn.active{color:var(--text);border-bottom-color:var(--text);}

  /* DAY TABS */
  .day-tabs{display:flex;overflow-x:auto;gap:4px;padding:14px 20px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--border);}
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{flex-shrink:0;padding:7px 12px;border:1px solid var(--border);border-bottom:none;background:none;color:var(--muted2);font-family:'DM Mono',monospace;font-size:0.63rem;letter-spacing:1px;cursor:pointer;border-radius:4px 4px 0 0;transition:all .12s;}
  .day-tab.pull{border-top:2px solid var(--pull);}
  .day-tab.dip {border-top:2px solid var(--dip);}
  .day-tab.active{background:var(--surface);color:var(--text);}
  .day-tab .dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px;vertical-align:middle;}
  .day-tab.pull .dot{background:var(--pull);}
  .day-tab.dip  .dot{background:var(--dip);}

  /* CONTENT */
  .content{padding:18px 20px;}
  .workout-title{font-family:'Bebas Neue',sans-serif;font-size:2.7rem;letter-spacing:3px;line-height:1;}
  .workout-title.pull{color:var(--pull);}
  .workout-title.dip {color:var(--dip);}
  .workout-subtitle{font-size:0.58rem;color:var(--muted2);letter-spacing:2px;margin-top:3px;margin-bottom:18px;}

  .totals-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
  .total-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 13px;}
  .total-card .label{font-size:0.56rem;color:var(--muted2);letter-spacing:2px;margin-bottom:3px;}
  .total-card .number{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:2px;line-height:1;}
  .total-card.pull .number{color:var(--pull);}
  .total-card.dip  .number{color:var(--dip);}

  /* SETS */
  .sets-container{display:flex;flex-direction:column;gap:10px;}
  .set-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .set-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);}
  .set-number{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--muted2);}
  .set-total{font-size:0.63rem;color:var(--muted2);}
  .set-total span{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px;}
  .set-body{padding:12px 14px;}
  .rep-input-row{display:flex;align-items:center;gap:10px;}
  .rep-label{font-size:0.58rem;color:var(--muted2);letter-spacing:1px;width:26px;}
  .rep-controls{display:flex;align-items:center;flex:1;}
  .rep-btn{width:36px;height:36px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;transition:background .1s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  .rep-btn:first-child{border-radius:6px 0 0 6px;}
  .rep-btn:last-child {border-radius:0 6px 6px 0;}
  .rep-btn:active{background:var(--border);}
  .done-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-family:'DM Mono',monospace;font-size:1rem;line-height:1;cursor:pointer;transition:background .1s;margin-left:6px;}
  .done-btn:active{background:var(--border);}
  .rep-prev{flex:1;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--muted);padding:4px 0;min-width:56px;}
  .done-btn{width:100%;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:1px;line-height:1;}
  .set-done{opacity:0.85;border-color:var(--pull);box-shadow:0 0 0 1px rgba(200,245,90,0.2);}
  .rep-value{flex:1;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px 0;min-width:56px;cursor:pointer;touch-action:manipulation;}
  .rep-value.pull{color:var(--pull);}
  .rep-value.dip {color:var(--dip);}
  .rep-value.zero{color:var(--muted);}
  .rep-value-input{flex:1;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);border-left:none;border-right:none;padding:4px 0;min-width:56px;color:var(--text);outline:none;appearance:textfield;-moz-appearance:textfield;}
  .rep-value-input.pull{color:var(--pull);}
  .rep-value-input.dip {color:var(--dip);}
  .rep-value-input.zero{color:var(--muted);}
  .rep-value-input::-webkit-outer-spin-button,
  .rep-value-input::-webkit-inner-spin-button{appearance:none;margin:0;}

  /* LADDER */
  .ladder-rungs{padding:8px 14px 12px;display:flex;flex-direction:column;gap:5px;}
  .rung-row{display:flex;align-items:center;gap:8px;}
  .rung-num{font-size:0.56rem;color:var(--muted2);width:46px;letter-spacing:1px;flex-shrink:0;}
  .rung-toggle{flex:1;height:30px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--muted2);font-family:'DM Mono',monospace;font-size:0.63rem;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;user-select:none;}
  .rung-toggle.done.pull{background:rgba(178,216,178,.08);border-color:var(--pull);color:var(--pull);}
  .rung-toggle.done.dip {background:rgba(240,240,240,.08);border-color:var(--dip); color:var(--dip);}
  .rung-toggle.failed{background:rgba(170,170,170,.05);border-color:#aaaaaa33;color:#aaaaaa55;text-decoration:line-through;}
  .add-rung-btn{width:100%;height:28px;border:1px dashed var(--border);border-radius:6px;background:none;color:var(--muted2);font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:1px;cursor:pointer;transition:all .12s;margin-top:3px;}
  .add-rung-btn:hover{border-color:var(--text);color:var(--text);}
  .fail-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:5px;background:none;color:var(--muted2);font-size:0.7rem;cursor:pointer;flex-shrink:0;transition:all .12s;}
  .fail-btn:hover{border-color:#aaaaaa;color:#aaaaaa;}

  /* WEEK SUMMARY */
  .week-summary{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:22px;}
  .week-summary h2{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;color:var(--muted2);margin-bottom:13px;}
  .week-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .week-stat .label{font-size:0.56rem;color:var(--muted2);letter-spacing:1px;margin-bottom:2px;}
  .week-stat .val{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;}
  .week-stat .val.pull{color:var(--pull);}
  .week-stat .val.dip {color:var(--dip);}
  .reset-btn{margin-top:14px;width:100%;padding:9px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted2);font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:2px;cursor:pointer;transition:all .12s;-webkit-tap-highlight-color:transparent;}
  .reset-btn:hover{border-color:#aaaaaa;color:#aaaaaa;}

  /* ?? PAST ENTRY VIEW ?? */
  .past-view{padding:18px 20px;}
  .past-view > h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:4px;margin-bottom:4px;}
  .past-view > p{font-size:0.58rem;color:var(--muted2);letter-spacing:1px;margin-bottom:20px;line-height:1.6;}

  .week-picker-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
  .week-picker-card label{display:block;font-size:0.56rem;color:var(--muted2);letter-spacing:2px;margin-bottom:8px;}
  .week-picker-card input[type=date]{
    width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--text);font-family:'DM Mono',monospace;font-size:0.75rem;padding:9px 12px;
    letter-spacing:1px;outline:none;
  }
  .week-picker-card input[type=date]:focus{border-color:var(--muted2);}
  .week-resolved{margin-top:10px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:3px;color:var(--muted2);}
  .week-resolved span{color:var(--text);}

  .past-day-tabs{display:flex;overflow-x:auto;gap:4px;padding-bottom:0;margin-bottom:16px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .past-day-tabs::-webkit-scrollbar{display:none;}
  .past-day-tab{flex-shrink:0;padding:7px 12px;border:1px solid var(--border);background:none;color:var(--muted2);font-family:'DM Mono',monospace;font-size:0.63rem;letter-spacing:1px;cursor:pointer;border-radius:6px;transition:all .12s;}
  .past-day-tab.pull{border-top:2px solid var(--pull);}
  .past-day-tab.dip {border-top:2px solid var(--dip);}
  .past-day-tab.active{background:var(--surface);color:var(--text);}
  .past-day-tab .dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px;vertical-align:middle;}
  .past-day-tab.pull .dot{background:var(--pull);}
  .past-day-tab.dip  .dot{background:var(--dip);}

  .past-sets-area{display:flex;flex-direction:column;gap:10px;}

  /* ladder input for past entry */
  .past-ladder-hint{font-size:0.56rem;color:var(--muted2);letter-spacing:1px;padding:10px 14px 4px;}
  .ladder-entry-row{display:flex;align-items:center;gap:8px;padding:0 14px 6px;}
  .ladder-entry-row .le-label{font-size:0.56rem;color:var(--muted2);width:52px;letter-spacing:1px;flex-shrink:0;}
  .ladder-entry-row input[type=number]{
    flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;
    padding:5px 10px;outline:none;letter-spacing:1px;
  }
  .ladder-entry-row input[type=number]:focus{border-color:var(--muted2);}
  .ladder-entry-row .le-remove{width:26px;height:26px;border:1px solid var(--border);border-radius:5px;background:none;color:var(--muted2);font-size:0.7rem;cursor:pointer;flex-shrink:0;transition:all .12s;}
  .ladder-entry-row .le-remove:hover{border-color:#aaaaaa;color:#aaaaaa;}
  .add-ladder-rung-btn{margin:4px 14px 12px;height:28px;border:1px dashed var(--border);border-radius:6px;background:none;color:var(--muted2);font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:1px;cursor:pointer;transition:all .12s;display:block;width:calc(100% - 28px);}
  .add-ladder-rung-btn:hover{border-color:var(--text);color:var(--text);}

  .save-past-btn{width:100%;padding:13px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:3px;cursor:pointer;transition:all .15s;margin-top:8px;}
  .save-past-btn:hover{background:var(--surface2);}
  .save-past-btn.pull{border-color:var(--pull);color:var(--pull);}
  .save-past-btn.dip {border-color:var(--dip); color:var(--dip);}
  .save-toast{display:none;text-align:center;padding:10px;font-size:0.6rem;letter-spacing:2px;color:var(--muted2);}
  .save-toast.show{display:block;}

  /* PROGRESS */
  .progress-view{padding:18px 20px;}
  .progress-view > h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:4px;margin-bottom:4px;}
  .progress-subtitle{font-size:0.58rem;color:var(--muted2);letter-spacing:2px;margin-bottom:16px;}
  .type-toggle{display:flex;gap:8px;margin-bottom:18px;}
  .type-btn{flex:1;padding:9px;border:1px solid var(--border);background:none;font-family:'DM Mono',monospace;font-size:0.63rem;letter-spacing:2px;cursor:pointer;border-radius:6px;transition:all .12s;color:var(--muted2);}
  .type-btn.active.pull{background:rgba(178,216,178,.1);border-color:var(--pull);color:var(--pull);}
  .type-btn.active.dip {background:rgba(240,240,240,.1);border-color:var(--dip); color:var(--dip);}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:15px;margin-bottom:13px;}
  .chart-title{font-size:0.56rem;color:var(--muted2);letter-spacing:2px;margin-bottom:13px;}

  /* HISTORY LIST */
  .section-label{font-size:0.56rem;color:var(--muted2);letter-spacing:2px;margin-bottom:9px;}
  .history-week{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;}
  .hw-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;user-select:none;}
  .hw-header:hover{background:var(--surface2);}
  .hw-label{font-size:0.58rem;color:var(--muted2);letter-spacing:1px;}
  .hw-current{font-size:0.48rem;color:var(--muted2);letter-spacing:1px;margin-top:2px;}
  .hw-total{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:2px;}
  .hw-total.pull{color:var(--pull);}
  .hw-total.dip {color:var(--dip);}
  .hw-body{padding:0 14px 10px;display:none;}
  .hw-body.open{display:block;}
  .hw-day-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:0.58rem;}
  .hw-day-row:last-child{border-bottom:none;}
  .hw-day-name{color:var(--muted2);letter-spacing:1px;}
  .hw-day-val{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px;}
  .hw-day-val.pull{color:var(--pull);}
  .hw-day-val.dip {color:var(--dip);}
  .no-data{text-align:center;padding:34px 20px;color:var(--muted2);font-size:0.6rem;letter-spacing:2px;}

  /* TIMER */
  .timer-panel{display:none;position:fixed;left:0;right:0;bottom:0;height:70px;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;align-items:center;justify-content:flex-start;gap:16px;z-index:150;pointer-events:none;}
  .timer-panel.active{display:flex;}
  .timer-info{font-size:0.63rem;color:var(--muted2);letter-spacing:3px;}
  .timer-display{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--text);min-width:50px;}
  .timer-display.pull{color:var(--pull);}
  .timer-display.dip{color:var(--dip);}
  .timer-skip{padding:8px 16px;border:1px solid var(--border);background:var(--surface2);color:var(--muted2);font-family:'DM Mono',monospace;font-size:0.63rem;letter-spacing:2px;cursor:pointer;border-radius:6px;pointer-events:auto;}

</style>
</head>
<body>

<header>
  <div>
    <h1>REP JOURNAL</h1>
    <div class="week-label" id="weekLabel">??/div>
    <div class="version-badge" id="versionBadge">BUILD ??/div>
    <div class="build-label" id="buildLabel">BUILD ??/div>
  </div>
  <div style="text-align:right">
    <div style="font-size:.53rem;color:var(--muted2);letter-spacing:2px">TODAY</div>
    <div id="todayLabel"></div>
    <button class="reset-btn" ontouchend="resetWeek()" style="font-size:0.5rem;margin-top:4px;">RESET WEEK</button>
  </div>
</header>

<div class="nav-bar">
  <button class="nav-btn active" id="navLog"      ontouchend="switchView('log')">LOG</button>
  <button class="nav-btn"        id="navPast"     ontouchend="switchView('past')">HISTORY</button>
  <button class="nav-btn"        id="navProgress" ontouchend="switchView('progress')">PROGRESS</button>
</div>

<!-- LOG VIEW -->
<div id="viewLog">
  <div class="day-tabs" id="dayTabs"></div>
  <div class="content"  id="content"></div>
</div>

<!-- HISTORY VIEW -->
<div id="viewPast" style="display:none">
  <div class="past-view">
    <h2>HISTORY</h2>
    <p>Pick any date within the week you want to log. Then select a day and enter your reps.</p>

    <div class="week-picker-card">
      <label>PICK ANY DATE IN THAT WEEK</label>
      <input type="date" id="pastDateInput" onchange="onPastDateChange()">
      <div class="week-resolved" id="pastWeekResolved">??SELECT A DATE ABOVE ??/div>
    </div>

    <div class="past-day-tabs" id="pastDayTabs"></div>
    <div id="pastSetsArea"></div>
    <div class="save-toast" id="saveToast">??SAVED</div>
  </div>
</div>

<!-- PROGRESS VIEW -->
<div id="viewProgress" style="display:none">
  <div class="progress-view" id="progressContent"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ?? CONFIG ???????????????????????????????????????????????????????????????????
const DAYS = [
  {id:0,name:'MON',label:'MONDAY',   type:'pull',workout:'max',   sets:3 },
  {id:1,name:'TUE',label:'TUESDAY',  type:'dip', workout:'max',   sets:3 },
  {id:2,name:'WED',label:'WEDNESDAY',type:'pull',workout:'volume',sets:10},
  {id:3,name:'THU',label:'THURSDAY', type:'dip', workout:'volume',sets:10},
  {id:4,name:'FRI',label:'FRIDAY',   type:'pull',workout:'ladder',sets:5 },
  {id:5,name:'SAT',label:'SATURDAY', type:'dip', workout:'ladder',sets:5 },
];
const APP_VERSION='2026.04.03.9';
const WORKOUT_LABELS={max:'MAX DAY - 3 x MAX REPS',volume:'SUB MAX VOLUME - 10 x VOLUME SETS',ladder:'LADDER VOLUME - 5 x LADDER SETS'};
const BUILD_VERSION='v13';

// ?? STORAGE ??????????????????????????????????????????????????????????????????
function mondayStr(d=new Date()){
  const m=new Date(d);
  m.setDate(m.getDate()-((m.getDay()+6)%7));
  m.setHours(0,0,0,0);
  return `${m.getFullYear()}_${String(m.getMonth()+1).padStart(2,'0')}_${String(m.getDate()).padStart(2,'0')}`;
}
function mondayDate(str){const[y,mo,d]=str.split('_').map(Number);return new Date(y,mo-1,d);}
function fmtWeek(str){
  const d = mondayDate(str);
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit', year:'numeric'});
}
function fmtWeekShort(str){return mondayDate(str).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}).toUpperCase();}

function getWeekNumber(d){
  const START_DATE = new Date(2026, 2, 16); // 16 March 2026
  const startMonday = mondayDate(mondayStr(START_DATE));
  const weekMonday = mondayDate(mondayStr(d));
  const diffMs = weekMonday - startMonday;
  const weeks = Math.floor(diffMs / (7 * 24 * 60 * 60 * 1000)) + 1;
  return Math.max(1, weeks);
}

const HISTORY_KEY='repjournal_v3';
const CURRENT_WEEK=mondayStr();

function loadHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||{};}catch{return {};}}
function saveHistory(h){localStorage.setItem(HISTORY_KEY,JSON.stringify(h));}

let history=loadHistory();
if(!history[CURRENT_WEEK])history[CURRENT_WEEK]={};
let state=history[CURRENT_WEEK];
function persist(){history[CURRENT_WEEK]=state;saveHistory(history);}

const weeks = Object.keys(history).sort();
const prevWeekKey = weeks.length > 0 && weeks.indexOf(CURRENT_WEEK) > 0 ? weeks[weeks.indexOf(CURRENT_WEEK) - 1] : null;

function getPrevSetReps(dayId, setIdx){
  if(!prevWeekKey) return 0;
  const prevData = history[prevWeekKey] || {};
  const dayData = prevData[dayId] || {};
  return dayData[`set_${setIdx}`] || 0;
}

  ['log','past','progress'].forEach(n=>{
    document.getElementById('view'+n.charAt(0).toUpperCase()+n.slice(1)).style.display=v===n?'':'none';
    document.getElementById('nav'+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle('active',v===n);

// ?? TIMER ?????????????????????????????????????????????????????????????????????
let timerInt=null, timerSecs=0, timerTarget=null, timerEnd=0;
function startTimer(workoutType, dayId, setIdx, duration){
  const defaultDur = workoutType==='max'?300:workoutType==='volume'?60:workoutType==='ladder'?30:30;
  const initialSecs = Number.isFinite(duration)?duration:defaultDur;
  timerSecs = initialSecs;
  timerEnd = Date.now() + initialSecs * 1000;
  timerTarget = `setTimer_${dayId}_${setIdx}`;
  
  const panel = document.getElementById('timerPanel');
  const info = document.getElementById('timerInfo');
  const disp = document.getElementById('timerDisplay');
  
  const label = workoutType==='max'?'REST ??NEXT SET':'volume'===workoutType?'REST ??NEXT SET':'REST ??NEXT RUNG';
  info.textContent = label;
  disp.className = 'timer-display ' + (workoutType==='ladder'?'pull':(workoutType==='max'?'dip':'pull'));
  updateGlobalTimerDisplay();
  panel.classList.add('active');
  document.body.classList.add('timer-active');
  
  clearInterval(timerInt);
  timerInt = setInterval(()=>{
    const remainingMs = timerEnd - Date.now();
    timerSecs = Math.max(0, Math.ceil(remainingMs / 1000));
    updateGlobalTimerDisplay();
    if(remainingMs <= 0) skipTimer();
  }, 250);
}
function updateGlobalTimerDisplay(){
  if(timerEnd>0){
    const remainingMs = timerEnd - Date.now();
    timerSecs = Math.max(0, Math.ceil(remainingMs / 1000));
  }
  const disp = document.getElementById('timerDisplay');
  const mm = String(Math.floor(timerSecs/60)).padStart(2,'0');
  const ss = String(timerSecs%60).padStart(2,'0');
  disp.textContent = `${mm}:${ss}`;
}
function skipTimer(){
  clearInterval(timerInt);
  timerEnd = 0;
  const panel = document.getElementById('timerPanel');
  panel.classList.remove('active');
  document.body.classList.remove('timer-active');
  timerTarget=null;
}

// ?? DATA HELPERS ??????????????????????????????????????????????????????????????
function dayState(weekData,dayId){if(!weekData[dayId])weekData[dayId]={};return weekData[dayId];}
function dayTotal(weekData,dayId){
  const day=DAYS[dayId],ds=weekData[dayId]||{};
  if(day.workout==='ladder'){let t=0;for(let s=0;s<day.sets;s++)(ds[`set_${s}`]||[]).forEach(r=>{if(!r.failed)t+=r.reps;});return t;}
  let t=0;for(let s=0;s<day.sets;s++)t+=ds[`set_${s}`]||0;return t;
}
function weekTotals(weekData){
  let pull=0,dip=0;
  DAYS.forEach(d=>{const t=dayTotal(weekData,d.id);if(d.type==='pull')pull+=t;else dip+=t;});
  return{pull,dip};
}
function getToday(){return(new Date().getDay()+6)%7;}

// ?? LOG VIEW ??????????????????????????????????????????????????????????????????
let activeDay=Math.min(getToday(),5);

function renderTabs(){
  const today=getToday(),c=document.getElementById('dayTabs');
  c.innerHTML='';
  DAYS.forEach(day=>{
    const b=document.createElement('button');
    b.className=`day-tab ${day.type}${day.id===activeDay?' active':''}`;
    b.innerHTML=`<span class="dot"></span>${day.name}${day.id===today?' *':''}`;
    b.ontouchend=()=>{activeDay=day.id;renderLog();};
    c.appendChild(b);
  });
}

function renderStdSets(day,ds,type){
  let h='';
  for(let s=0;s<day.sets;s++){
    const val = ds[`set_${s}`] !== undefined ? ds[`set_${s}`] : 0;
    const prev = getPrevSetReps(day.id, s) || 0;
    const done = ds[`set_${s}_done`];
    const cc = val === 0 ? 'zero' : type;
    h+=`<div class="set-card${done?' set-done':''}"><div class="set-header"><div class="set-number">SET ${s+1}</div><div class="set-total"><span style="color:var(--${type})">${val}</span> REPS</div></div><div class="set-body"><div class="rep-input-row"><div class="rep-label">REPS</div><div class="rep-controls"><button class="rep-btn" ontouchend="chRep(${day.id},${s},-1)">-</button><input class="rep-value-input ${cc}" data-rep-input="${day.id}_${s}" type="number" min="0" inputmode="numeric" pattern="[0-9]*" value="${val}" onfocus="promptRep(${day.id},${s})" oninput="setRepValue(${day.id},${s},this,false)" onchange="updateRepValueAndTimer(${day.id},${s},this)" onblur="updateRepValueAndTimer(${day.id},${s},this)" onkeydown="if(event.key==='Enter'){event.preventDefault();updateRepValueAndTimer(${day.id},${s},this)}"><button class="rep-btn" ontouchend="chRep(${day.id},${s},1)">+</button></div><div class="rep-prev">${prev}</div><span class="set-timer" id="setTimer_${day.id}_${s}"></span><button class="done-btn" onclick="completeSet(${day.id},${s})">✓</button></div></div></div>`;
  }
  return h;
}

function renderLadderSets(day,ds,type){
  let h='';
  for(let s=0;s<day.sets;s++){
    const rungs=ds[`set_${s}`]||[];
    const setTot=rungs.reduce((a,r)=>a+(r.failed?0:r.reps),0);
    let rh='';
    rungs.forEach((r,ri)=>{
      const sc=r.failed?'failed':(r.done?`done ${type}`:'');
      const ic=r.failed?'x':(r.done?'v':'o');
      rh+=`<div class="rung-row"><div class="rung-num">RUNG ${ri+1} (${r.reps}x)</div><button class="rung-toggle ${sc}" onclick="toggleRung(${day.id},${s},${ri})">${ic} ${r.reps} REP${r.reps>1?'S':''}</button><button class="fail-btn" ontouchend="failRung(${day.id},${s},${ri})">x</button></div>`;
    });
    h+=`<div class="set-card"><div class="set-header"><div class="set-number">SET ${s+1}</div><div class="set-total"><span style="color:var(--${type})">${setTot}</span> REPS</div></div><div class="ladder-rungs">${rh}<button class="add-rung-btn" onclick="addRung(${day.id},${s},'${type}')">+ ADD NEXT RUNG</button></div></div>`;
  }
  return h;
}

function renderLog(){
  renderTabs();
  const day=DAYS[activeDay],ds=dayState(state,activeDay);
  const type=day.type,tot=dayTotal(state,activeDay),wt=weekTotals(state);
  const setsHtml=day.workout==='ladder'?renderLadderSets(day,ds,type):renderStdSets(day,ds,type);
  document.getElementById('content').innerHTML=`
    <div><div class="workout-title ${type}">${type==='pull'?'PULL UPS':'DIPS'}</div><div class="workout-subtitle">${WORKOUT_LABELS[day.workout]}</div></div>
    <div class="totals-bar">
      <div class="total-card ${type}"><div class="label">TODAY</div><div class="number">${tot}</div></div>
    </div>

    <div class="week-summary">
      <h2>WEEKLY TOTALS</h2>
      <div class="week-grid">
        <div class="week-stat"><div class="label">PULL UPS</div><div class="val pull">${wt.pull}</div></div>
        <div class="week-stat"><div class="label">DIPS</div><div class="val dip">${wt.dip}</div></div>
      </div>
    </div>`;
  const today=getToday();

}

function chRep(dayId,si,delta){const ds=dayState(state,dayId),k=`set_${si}`;const current=ds[k]!==undefined?ds[k]:0;ds[k]=Math.max(0,current+delta);if(ds[k]===0)ds[`${k}_done`]=false;persist();renderLog();}
function parseRepValue(value){
  const digits=String(value??'').replace(/\D/g,'');
  if(!digits) return 0;
  return Math.max(0,parseInt(digits,10) || 0);
}
function normalizeRepInput(input){
  let digits=String(input.value??'').replace(/\D/g,'');
  if(digits.length>1) digits=digits.replace(/^0+/,'') || '0';
  if(input.value!==digits) input.value=digits;
  return digits;
}
function setRepValue(dayId,si,input,rerender){
  const ds=dayState(state,dayId),k=`set_${si}`;
  ds[k]=parseRepValue(normalizeRepInput(input));
  if(ds[k]===0)ds[`${k}_done`]=false;
  persist();
  if(rerender) renderLog();
}
function updateRepValueAndTimer(dayId,si,input){
  setRepValue(dayId,si,input,false);
  const day=DAYS[dayId];
  if(day) startTimer(day.workout, dayId, si);
}
function promptRep(dayId,si){
  const input=document.querySelector(`[data-rep-input="${dayId}_${si}"]`);
  if(!input) return;
  input.focus();
  input.select();
}
function completeSet(dayId,si){
  const day=DAYS[dayId];
  const ds=dayState(state,dayId);
  const k=`set_${si}`;
  const current=ds[k]!==undefined?ds[k]:0;
  ds[k]=Math.max(0,current);
  ds[`${k}_done`]=true;
  persist();
  startTimer(day.workout, dayId, si);
  renderLog();
}
function addRung(dayId,si,type){const ds=dayState(state,dayId),k=`set_${si}`;if(!ds[k])ds[k]=[];const rungs=ds[k];rungs.push({reps:rungs.length+1,done:false,failed:false});persist();renderLog();startTimer('ladder',dayId,si,30);}function toggleRung(dayId,si,ri){const ds=dayState(state,dayId),rungs=ds[`set_${si}`]||[];if(rungs[ri]&&!rungs[ri].failed){rungs[ri].done=!rungs[ri].done;if(rungs[ri].done)startTimer('ladder',dayId,si,30);}persist();renderLog();}
function failRung(dayId,si,ri){
  const ds=dayState(state,dayId),rungs=ds[`set_${si}`]||[];
  if(rungs[ri]) rungs.splice(ri,1);
  persist();
  renderLog();
}
function resetWeek(){if(!confirm('Reset all data for this week?'))return;history[CURRENT_WEEK]={};state=history[CURRENT_WEEK];saveHistory(history);renderLog();}

// ?? ADD PAST VIEW ?????????????????????????????????????????????????????????????
let pastWeekKey = null;   // currently selected past week key
let pastActiveDay = 0;    // currently selected day in past entry
// Transient state for the past entry form (per day)
// pastFormData[weekKey][dayId][setIdx] = reps  (for std/volume)
// pastFormData[weekKey][dayId][setIdx] = [{reps}] (for ladder)
let pastFormData = {};

function initPastView(){
  // Set default date to 7 days ago
  const def = new Date(); def.setDate(def.getDate()-7);
  const inp = document.getElementById('pastDateInput');
  if(!inp.value){
    inp.value = def.toISOString().split('T')[0];
    onPastDateChange();
  }
}

function onPastDateChange(){
  const inp = document.getElementById('pastDateInput');
  if(!inp.value) return;
  const chosen = new Date(inp.value + 'T00:00:00');
  pastWeekKey = mondayStr(chosen);
  // Don't allow editing current week here
  if(pastWeekKey === CURRENT_WEEK){
    document.getElementById('pastWeekResolved').innerHTML =
      `<span style="color:#ff6b35">THAT'S THE CURRENT WEEK ??USE THE LOG TAB</span>`;
    document.getElementById('pastDayTabs').innerHTML='';
    document.getElementById('pastSetsArea').innerHTML='';
    return;
  }
  document.getElementById('pastWeekResolved').innerHTML =
    `WEEK OF <span>${fmtWeek(pastWeekKey)}</span>`;
  // Pre-load existing history into form data if present
  if(!pastFormData[pastWeekKey]){
    pastFormData[pastWeekKey] = {};
    // Copy existing saved data into form
    const existing = history[pastWeekKey] || {};
    DAYS.forEach(day=>{
      pastFormData[pastWeekKey][day.id] = JSON.parse(JSON.stringify(existing[day.id]||{}));
    });
  }
  pastActiveDay = 0;
  renderPastDayTabs();
  renderPastSets();
}

function renderPastDayTabs(){
  const c=document.getElementById('pastDayTabs');
  c.innerHTML='';
  DAYS.forEach(day=>{
    const b=document.createElement('button');
    b.className=`past-day-tab ${day.type}${day.id===pastActiveDay?' active':''}`;
    b.innerHTML=`<span class="dot"></span>${day.name}`;
    b.ontouchend=()=>{pastActiveDay=day.id;renderPastDayTabs();renderPastSets();};
    c.appendChild(b);
  });
}

function renderPastSets(){
  if(!pastWeekKey) return;
  const day=DAYS[pastActiveDay];
  const type=day.type;
  const fd=pastFormData[pastWeekKey][pastActiveDay]||{};
  const area=document.getElementById('pastSetsArea');

  if(day.workout==='ladder'){
    // Ladder: show sets, each set has a list of rungs with reps fields
    let h=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px;">
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--muted2)">LADDER SETS</div>
        <div style="font-size:0.55rem;color:var(--muted2);letter-spacing:1px;">ENTER MAX RUNG REACHED PER SET</div>
      </div>`;
    for(let s=0;s<day.sets;s++){
      const rungs=fd[`set_${s}`]||[];
      let rh='';
      rungs.forEach((r,ri)=>{
        rh+=`<div class="ladder-entry-row">
          <div class="le-label">RUNG ${ri+1} (${ri+1} REP${ri+1>1?'S':''})</div>
          <input type="number" min="0" value="${r.reps||ri+1}" readonly style="opacity:0.5;width:60px;flex:none;">
          <button class="le-remove" ontouchend="pastRemoveRung(${s},${ri})">??/button>
        </div>`;
      });
      const setTot = rungs.reduce((a,r)=>a+r.reps,0);
      h+=`<div style="border-bottom:1px solid var(--border);padding-bottom:4px;">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 14px 4px;">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:2px;color:var(--muted2)">SET ${s+1}</div>
          <div style="font-size:0.6rem;color:var(--muted2)"><span style="font-family:'Bebas Neue',sans-serif;font-size:0.9rem;color:var(--${type})">${setTot}</span> REPS</div>
        </div>
        ${rh}
        <button class="add-ladder-rung-btn" ontouchend="pastAddRung(${s})">+ ADD RUNG (${rungs.length+1} REPS)</button>
      </div>`;
    }
    h+=`</div>`;
    area.innerHTML = h + saveBtnHtml(type);
  } else {
    // Max / Volume: simple +/- per set
    let h='<div class="past-sets-area">';
    for(let s=0;s<day.sets;s++){
      const val=fd[`set_${s}`]||0,cc=val===0?'zero':type;
      h+=`<div class="set-card">
        <div class="set-header">
          <div class="set-number">SET ${s+1}</div>
          <div class="set-total"><span style="color:var(--${type})">${val}</span> REPS</div>
        </div>
        <div class="set-body">
          <div class="rep-input-row">
            <div class="rep-label">REPS</div>
            <div class="rep-controls">
              <button class="rep-btn" ontouchend="pastChRep(${s},-1)">??/button>
              <input class="rep-value-input ${cc}" id="past_rep_${s}" type="number" min="0" inputmode="numeric" pattern="[0-9]*" value="${val}" oninput="setPastRepValue(${s},this,false)" onchange="setPastRepValue(${s},this,true)" onblur="setPastRepValue(${s},this,true)">
              <button class="rep-btn" ontouchend="pastChRep(${s},1)">+</button>
            </div>
          </div>
        </div>
      </div>`;
    }
    h+='</div>';
    area.innerHTML = h + saveBtnHtml(type);
  }
}

function saveBtnHtml(type){
  return `<button class="save-past-btn ${type}" ontouchend="savePastDay()" style="margin-top:14px">SAVE THIS DAY ??/button>
          <div class="save-toast" id="saveToast"></div>`;
}

function pastChRep(si,delta){
  if(!pastWeekKey) return;
  const fd=pastFormData[pastWeekKey][pastActiveDay];
  const k=`set_${si}`;
  fd[k]=Math.max(0,(fd[k]||0)+delta);
  renderPastSets();
}
function setPastRepValue(si,input,rerender){
  if(!pastWeekKey) return;
  const fd=pastFormData[pastWeekKey][pastActiveDay];
  const k=`set_${si}`;
  fd[k]=parseRepValue(normalizeRepInput(input));
  if(rerender) renderPastSets();
}
function pastPromptRep(si){
  const input=document.getElementById(`past_rep_${si}`);
  if(!input) return;
  input.focus();
  input.select();
}
function pastAddRung(si){
  if(!pastWeekKey) return;
  const fd=pastFormData[pastWeekKey][pastActiveDay];
  const k=`set_${si}`;
  if(!fd[k])fd[k]=[];
  const rungs=fd[k];
  rungs.push({reps:rungs.length+1,done:true,failed:false});
  renderPastSets();
}
function pastRemoveRung(si,ri){
  if(!pastWeekKey) return;
  const fd=pastFormData[pastWeekKey][pastActiveDay];
  const k=`set_${si}`;
  if(fd[k])fd[k].splice(ri,1);
  renderPastSets();
}
function savePastDay(){
  if(!pastWeekKey) return;
  if(!history[pastWeekKey]) history[pastWeekKey]={};
  // Copy this day's form data into history
  history[pastWeekKey][pastActiveDay] = JSON.parse(JSON.stringify(pastFormData[pastWeekKey][pastActiveDay]));
  saveHistory(history);
  const toast=document.getElementById('saveToast');
  toast.textContent=`??${DAYS[pastActiveDay].label} SAVED`;
  toast.className='save-toast show';
  setTimeout(()=>toast.className='save-toast',2000);
}

// ?? PROGRESS VIEW ?????????????????????????????????????????????????????????????
let progressType='pull',chartWeekly=null,chartDay=null;
function setProgressType(t){progressType=t;renderProgress();}
function toggleHistWeek(el){el.nextElementSibling.classList.toggle('open');}

function renderProgress(){
  const pc=document.getElementById('progressContent');
  const weeks=Object.keys(history).sort();
  const type=progressType;
  const color='#b2d8b2';
  const colorA='rgba(178,216,178,.12)';
  const wkLabels=[],wkTotals=[];
  weeks.forEach(wk=>{wkLabels.push(fmtWeekShort(wk));const wt=weekTotals(history[wk]||{});wkTotals.push(type==='pull'?wt.pull:wt.dip);});
  const typeDays=DAYS.filter(d=>d.type===type);
  const palette=['#f0f0f0','#cccccc','#aaaaaa'];
  const dayDatasets=typeDays.map((day,i)=>({
    label: WORKOUT_LABELS[day.workout].split(' ??')[0],
    data:weeks.map(wk=>dayTotal(history[wk]||{},day.id)),
    borderColor:palette[i%palette.length],
    backgroundColor:'transparent',
    tension:0.35,pointRadius:4,
    pointBackgroundColor:palette[i%palette.length],
    borderWidth:2,
  }));

  let histHtml='';
  if(weeks.length===0){histHtml='<div class="no-data">NO DATA YET ??START LOGGING!</div>';}
  else{
    [...weeks].reverse().forEach(wk=>{
      const wd=history[wk]||{},wt=weekTotals(wd),tot=type==='pull'?wt.pull:wt.dip,isCur=wk===CURRENT_WEEK;
      let typeSets = {};
      DAYS.filter(d=>d.type===type).forEach(day=>{
        const dayTypeLabel = day.workout === 'max' ? 'Max Days' : day.workout === 'volume' ? 'Sub Max Volume' : 'Ladder Volume';
        if(!typeSets[dayTypeLabel]) typeSets[dayTypeLabel] = [];
        for(let s=0; s<day.sets; s++){
          let setReps = 0;
          if(day.workout === 'ladder'){
            const rungs = wd[day.id]?.[`set_${s}`] || [];
            rungs.forEach(r => { if(!r.failed) setReps += r.reps; });
          } else {
            setReps = wd[day.id]?.[`set_${s}`] || 0;
          }
          if(setReps > 0){
            typeSets[dayTypeLabel].push(`${setReps}`);
          }
        }
      });
      let drows = '';
      Object.keys(typeSets).forEach(typeLabel => {
        if(typeSets[typeLabel].length > 0){
          drows += `<div class="hw-day-row"><span class="hw-day-name">${typeLabel}</span><span class="hw-day-val ${type}">${typeSets[typeLabel].join(', ')}</span></div>`;
        }
      });
      histHtml+=`<div class="history-week"><div class="hw-header" ontouchend="toggleHistWeek(this)"><div><div class="hw-label">${fmtWeek(wk)}</div>${isCur?'<div class="hw-current">CURRENT WEEK</div>':''}</div><div class="hw-total ${type}">${tot} <span style="font-size:.62rem;font-family:'DM Mono';color:var(--muted2)">REPS</span></div></div><div class="hw-body">${drows}</div></div>`;
    });
  }

  pc.innerHTML=`
    <h2>PROGRESS</h2>
    <div class="progress-subtitle">YOUR GROWTH OVER TIME</div>
    <div class="type-toggle">
      <button class="type-btn ${type==='pull'?'active pull':''}" ontouchend="setProgressType('pull')">PULL UPS</button>
      <button class="type-btn ${type==='dip'?'active dip':''}"  ontouchend="setProgressType('dip')">DIPS</button>
    </div>
    <div class="chart-card"><div class="chart-title">WEEKLY TOTAL REPS</div><canvas id="weeklyChart" height="155"></canvas></div>
    <div class="chart-card"><div class="chart-title">REPS PER SESSION (BY DAY)</div><canvas id="dayChart" height="185"></canvas></div>
    <div class="section-label">WEEK HISTORY</div>${histHtml}`;

  if(chartWeekly){chartWeekly.destroy();chartWeekly=null;}
  if(chartDay){chartDay.destroy();chartDay=null;}
  const gc='#1f1f1f';
  Chart.defaults.color='#555';Chart.defaults.font.family="'DM Mono', monospace";Chart.defaults.font.size=10;

  chartWeekly=new Chart(document.getElementById('weeklyChart').getContext('2d'),{
    type:'bar',
    data:{labels:wkLabels,datasets:[{label:type==='pull'?'Pull Ups':'Dips',data:wkTotals,backgroundColor:colorA,borderColor:color,borderWidth:2,borderRadius:4}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{color:'#555',maxRotation:40}},y:{grid:{color:gc},ticks:{color:'#555'},beginAtZero:true}}}
  });
  chartDay=new Chart(document.getElementById('dayChart').getContext('2d'),{
    type:'line',
    data:{labels:wkLabels,datasets:dayDatasets},
    options:{responsive:true,plugins:{legend:{display:true,labels:{color:'#666',boxWidth:10,padding:12}}},scales:{x:{grid:{color:gc},ticks:{color:'#555',maxRotation:40}},y:{grid:{color:gc},ticks:{color:'#555'},beginAtZero:true}}}
  });
}

renderLog();
</script>
